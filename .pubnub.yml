name: unreal-engine-chat
version: 1.0.1
schema: 1
scm: github.com/pubnub/unreal-engine-chat
changelog:
  - date: 2026-04-20
    version: 1.0.1
    changes:
      - type: bug
        text: "Fix compilation errors when C++ 20 support is not enabled by replace designated initializers."
      - type: bug
        text: "Fix not initialized properly errors printed for some UStruct properties."
  - date: 2026-04-02
    version: 1.0.0
    changes:
      - type: feature
        text: "The subsystem now supports multiple simultaneous chat sessions keyed by UserID."
      - type: feature
        text: "All public methods now have synchronous and asynchronous variants. Async methods use the 'Async' suffix and accept a delegate for handling the result."
      - type: feature
        text: "Entity objects (channels, users, memberships, messages) are now synchronized by ID. All references to the same entity ID share the latest locally known data, so updating one instance updates the others."
      - type: feature
        text: "Added a chat config option to specify which channel types publish read receipt events."
      - type: feature
        text: "Memberships can now be hard-deleted."
      - type: feature
        text: "Added methods for retrieving and checking singular memberships for users and channels."
      - type: feature
        text: "Added a plug-and-play chat UI sample in Content/SampleChat, including the W_PubnubChat_Sample widget."
      - type: feature
        text: "Added a utility AppendText() method to Membership."
      - type: feature
        text: "Added GetMessageElements() to Message. It returns the same data model as MessageDraft."
      - type: improvement
        text: "BREAKING CHANGE: The precompiled external Cpp Chat library is no longer required. PubNub UE Chat SDK now depends on PubNub UE SDK (Core)."
      - type: improvement
        text: "BREAKING CHANGE: Public types now follow a consistent FPubnubChat... / UPubnubChat... naming scheme so classes, delegates, results, and input types belong to this plugin and do not collide with other PubNub plugins."
      - type: improvement
        text: "BREAKING CHANGE: All operation result types now include a common FPubnubChatOperationResult inside dedicated FPubnubChat...Result structs, for both synchronous returns and async callbacks. Use it to handle success and error state consistently across all operations."
      - type: improvement
        text: "Connect and Join are now separate concepts. Join only adds a member to a channel and no longer calls Connect internally. Use Join + Connect to preserve the previous behavior."
      - type: improvement
        text: "BREAKING CHANGE: ListenForEvents has been replaced with dedicated streams for each event type, exposed on the related entities."
      - type: improvement
        text: "BREAKING CHANGE: Read receipts now use per-user read events instead of aggregated event data."
      - type: improvement
        text: "BREAKING CHANGE: Message reactions now use a simpler, easier-to-use format."
      - type: improvement
        text: "BREAKING CHANGE: Most advanced message sending features, such as files, quotes, and mentions, are now available only through MessageDraft."
      - type: improvement
        text: "BREAKING CHANGE: Internal events such as invites and mentions can no longer be sent manually. Only events with the Custom type may be sent directly."
  - date: 2025-08-21
    version: v0.4.4
    changes:
      - type: bug
        text: "Fix crash that could be caused by Connection Status Listener, because it was not executed on Game Thread."
  - date: 2025-07-08
    version: v0.4.3
    changes:
      - type: bug
        text: "Fix crashes that could happen when empty or invalid parameters were passed to some functions. Add needed guard checks and print to log in case of incorrect input."
      - type: bug
        text: "Remove false warnings that were printed from C-Core."
      - type: bug
        text: "Adjust Copyrights in files and FabUrl to fix issues reported by FAB."
  - date: 2025-06-16
    version: v0.4.2
    changes:
      - type: improvement
        text: "Add support for UE 5.6."
  - date: 2025-06-02
    version: v0.4.1
    changes:
      - type: feature
        text: "Add Connection Status Listener and Reconnect/DisconnectSubscriptions methods."
  - date: 2025-05-12
    version: v0.4.0
    changes:
      - type: feature
        text: "Add dedicated structure to hold Membership CustomJson, Status and Type and replace setting CustomJson with this structure."
      - type: improvement
        text: "Add debugging symbols."
      - type: bug
        text: "Fix bugs that sometimes Membership CustomData was set from Channel CustomData."

sdks:
  - 
      full-name: PubNub Unreal Engine Chat SDK
      short-name: UE Chat
      artifacts:
        -
          artifact-type: package
          language: C++
          tier: 2
          tags:
            - Desktop
            - Game Engine
          source-repository: https://github.com/pubnub/unreal-engine-chat
          documentation: https://www.pubnub.com/docs/chat/unreal-chat-sdk
          distributions:
            -
              distribution-type: source-code
              distribution-repository: GitHub release
              package-name: pubnub
              location: https://github.com/pubnub/unreal-engine-chat
              supported-platforms:
                supported-operating-systems:
                  Linux:
                    runtime-version:
                      - Unreal Engine 5
                    minimum-os-version:
                      - Ubuntu 20.04 LTS
                    maximum-os-version:
                      - Ubuntu 24.04 LTS
                    target-architecture:
                      - x86-64
                  macOS:
                    runtime-version:
                      - Unreal Engine 5
                    minimum-os-version:
                      - macOS 12.5
                    maximum-os-version:
                      - macOS 15.5
                    target-architecture:
                      - x86-64
                  Windows:
                    runtime-version:
                      - Unreal Engine 5
                    minimum-os-version:
                      - Windows 10 Home
                    maximum-os-version:
                      - Windows 11 Pro
                    target-architecture:
                      - x86-64


supported-platforms:
  - version: PubNub Unreal Engine Chat SDK
    platforms:
      - Windows
      - Mac OS
      - IOS       
      - Unix 
      - Android 