# PubnubChat plugin CI: build and run automation tests using Unreal Test Project
# Runs on: unreal-engine-chat repo (PR or push to main/master)
# Requires: UE 5.5 at UE_PATH on macOS runner; unreal-test-project has Pubnub + PubnubChat as submodules

name: Unreal Engine Tests (macOS)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  UE_PATH: "/Users/Shared/Epic Games/UE_5.5"
  TEST_PROJECT_REPO: "https://github.com/pubnub/unreal-test-project.git"
  PUBNUB_SDK_REPO: "https://github.com/pubnub/unreal-engine.git"
  TEST_PROJECT_DIR: "unreal-test-project"
  # Branch of unreal-engine (Pubnub SDK) to use
  PUBNUB_SDK_BRANCH: "CLEN-3069_Multiple_Contexts"

jobs:
  test:
    runs-on:
      group: macos-gh
    # Four editor runs (sequential); allow headroom vs single-wave runs.
    timeout-minutes: 180

    env:
      PN_PUB_KEY: ${{ secrets.PN_PUB_KEY }}
      PN_SUB_KEY: ${{ secrets.PN_SUB_KEY }}
      PN_SEC_KEY: ${{ secrets.PN_SEC_KEY }}
      PN_PUB_KEY_PAM: ${{ secrets.PN_PUB_KEY_PAM }}
      PN_SUB_KEY_PAM: ${{ secrets.PN_SUB_KEY_PAM }}
      PN_SEC_KEY_PAM: ${{ secrets.PN_SEC_KEY_PAM }}

    steps:
      # --- Checkout PubnubChat plugin (this repo, PR branch or push branch)
      - name: Checkout PubnubChat (current branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # --- Clone Unreal Test Project (master) with submodules (private repo: use token)
      - name: Clone Unreal Test Project
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOKEN="${GH_TOKEN:-$GITHUB_TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "No token available. For private repos, add secret GH_TOKEN (repo scope) or ensure GITHUB_TOKEN can access other org repos."
            exit 1
          fi
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone --depth 1 --branch master "${{ env.TEST_PROJECT_REPO }}" "${{ env.TEST_PROJECT_DIR }}"
          cd "${{ env.TEST_PROJECT_DIR }}"
          git submodule update --init --recursive

      # --- Point Pubnub plugin to unreal-engine branch (fetch from canonical PUBNUB_SDK_REPO so branch is found)
      - name: Use Pubnub SDK (unreal-engine) at ${{ env.PUBNUB_SDK_BRANCH }}
        run: |
          cd "${{ env.TEST_PROJECT_DIR }}"
          if [ -d "Plugins/Pubnub" ]; then
            cd Plugins/Pubnub
            BRANCH="${{ env.PUBNUB_SDK_BRANCH }}"
            # Ensure origin points to canonical repo (submodule may use relative/fork URL)
            git remote set-url origin "${{ env.PUBNUB_SDK_REPO }}"
            git fetch origin "$BRANCH"
            git checkout "origin/$BRANCH"
            echo "Using Pubnub SDK branch: $BRANCH"
            cd "${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}"
          fi

      # --- Override PubnubChat with this repo (current branch under test)
      - name: Use PubnubChat from current branch (PR / push)
        run: |
          rm -rf "${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}/Plugins/PubnubChat"
          mkdir -p "${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}/Plugins/PubnubChat"
          rsync -a --exclude='.git' --exclude='unreal-test-project' "${{ github.workspace }}/" "${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}/Plugins/PubnubChat/"

      # --- Resolve .uproject path
      - name: Find project file
        id: project
        run: |
          cd "${{ env.TEST_PROJECT_DIR }}"
          UPROJECT=$(find . -maxdepth 1 -name "*.uproject" -print -quit)
          if [ -z "$UPROJECT" ]; then
            echo "error=No .uproject found in ${{ env.TEST_PROJECT_DIR }}" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          UPROJECT="${UPROJECT#./}"
          PROJECT_NAME="${UPROJECT%.uproject}"
          echo "uproject=$UPROJECT" >> "$GITHUB_OUTPUT"
          echo "name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "Project: $UPROJECT (target: $PROJECT_NAME)"

      # --- Generate project files (required for Editor build and plugin modules)
      - name: Generate project files
        env:
          HOME: ${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}/Saved/UEHome
        run: |
          set -e
          mkdir -p "$HOME/Documents/Library/Application Support/Epic/UnrealEngine"
          UE_PATH="${{ env.UE_PATH }}"
          PROJ_DIR="${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}"
          UPROJECT="${{ steps.project.outputs.uproject }}"
          GEN_SCRIPT="$UE_PATH/Engine/Build/BatchFiles/Mac/GenerateProjectFiles.sh"
          if [ ! -f "$GEN_SCRIPT" ]; then
            echo "GenerateProjectFiles.sh not found: $GEN_SCRIPT"
            exit 1
          fi
          "$GEN_SCRIPT" -project="$PROJ_DIR/$UPROJECT" -game
          echo "Project files generated."

      # --- Compile project (Editor target for running automation tests in UnrealEditor)
      - name: Compile project
        id: build
        env:
          HOME: ${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}/Saved/UEHome
        run: |
          set -e
          mkdir -p "$HOME/Documents/Library/Application Support/Epic/UnrealEngine"
          UE_PATH="${{ env.UE_PATH }}"
          PROJ_DIR="${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}"
          UPROJECT="${{ steps.project.outputs.uproject }}"
          PROJECT_NAME="${{ steps.project.outputs.name }}"
          EDITOR_TARGET="${PROJECT_NAME}Editor"
          UBT_SCRIPT="$UE_PATH/Engine/Build/BatchFiles/Mac/RunUBT.sh"
          if [ ! -f "$UBT_SCRIPT" ]; then
            UBT_SCRIPT="$UE_PATH/Engine/Build/BatchFiles/Mac/Build.sh"
          fi
          echo "Building $EDITOR_TARGET (Mac Development)..."
          "$UBT_SCRIPT" "$EDITOR_TARGET" Mac Development -project="$PROJ_DIR/$UPROJECT" -verbose 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "--- Build failed ---"
            tail -n 200 build.log
            exit 1
          fi
          echo "Build succeeded."

      # --- Run automation tests (four waves: separate logs + TestReport dirs; merged in parse step)
      - name: Run automation tests (Pubnub.aUnit)
        id: tests_aunit
        if: always() && steps.build.outcome == 'success'
        continue-on-error: true
        env:
          HOME: ${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}/Saved/UEHome
        run: |
          mkdir -p "$HOME/Documents/Library/Application Support/Epic/UnrealEngine"
          UE_PATH="${{ env.UE_PATH }}"
          PROJ_DIR="${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}"
          UPROJECT="${{ steps.project.outputs.uproject }}"
          REPORT_DIR="$PROJ_DIR/Saved/TestReport_aunit"
          RUN_SCRIPT="$PROJ_DIR/Plugins/PubnubChat/Scripts/run_mac_automation_tests.sh"
          chmod +x "$RUN_SCRIPT"
          set +e
          UE_PATH="$UE_PATH" PROJ_DIR="$PROJ_DIR" UPROJECT="$UPROJECT" \
            AUTOMATION_FILTER="Pubnub.aUnit" \
            REPORT_DIR="$REPORT_DIR" \
            LOG_FILE="${{ github.workspace }}/test_run_pubnub_aunit.log" \
            bash "$RUN_SCRIPT"
          EDITOR_EXIT=$?
          echo "exit_code=$EDITOR_EXIT" >> "$GITHUB_OUTPUT"
          exit "$EDITOR_EXIT"

      - name: Run automation tests (Pubnub.Integration)
        id: tests_pubnub_integration
        if: always() && steps.build.outcome == 'success'
        continue-on-error: true
        env:
          HOME: ${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}/Saved/UEHome
        run: |
          mkdir -p "$HOME/Documents/Library/Application Support/Epic/UnrealEngine"
          UE_PATH="${{ env.UE_PATH }}"
          PROJ_DIR="${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}"
          UPROJECT="${{ steps.project.outputs.uproject }}"
          REPORT_DIR="$PROJ_DIR/Saved/TestReport_pubnub_integration"
          RUN_SCRIPT="$PROJ_DIR/Plugins/PubnubChat/Scripts/run_mac_automation_tests.sh"
          chmod +x "$RUN_SCRIPT"
          set +e
          UE_PATH="$UE_PATH" PROJ_DIR="$PROJ_DIR" UPROJECT="$UPROJECT" \
            AUTOMATION_FILTER="Pubnub.Integration" \
            REPORT_DIR="$REPORT_DIR" \
            LOG_FILE="${{ github.workspace }}/test_run_pubnub_integration.log" \
            bash "$RUN_SCRIPT"
          EDITOR_EXIT=$?
          echo "exit_code=$EDITOR_EXIT" >> "$GITHUB_OUTPUT"
          exit "$EDITOR_EXIT"

      - name: Run automation tests (PubnubChat.Unit)
        id: tests_pubnubchat_unit
        if: always() && steps.build.outcome == 'success'
        continue-on-error: true
        env:
          HOME: ${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}/Saved/UEHome
        run: |
          mkdir -p "$HOME/Documents/Library/Application Support/Epic/UnrealEngine"
          UE_PATH="${{ env.UE_PATH }}"
          PROJ_DIR="${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}"
          UPROJECT="${{ steps.project.outputs.uproject }}"
          REPORT_DIR="$PROJ_DIR/Saved/TestReport_pubnubchat_unit"
          RUN_SCRIPT="$PROJ_DIR/Plugins/PubnubChat/Scripts/run_mac_automation_tests.sh"
          chmod +x "$RUN_SCRIPT"
          set +e
          UE_PATH="$UE_PATH" PROJ_DIR="$PROJ_DIR" UPROJECT="$UPROJECT" \
            AUTOMATION_FILTER="PubnubChat.Unit" \
            REPORT_DIR="$REPORT_DIR" \
            LOG_FILE="${{ github.workspace }}/test_run_pubnubchat_unit.log" \
            bash "$RUN_SCRIPT"
          EDITOR_EXIT=$?
          echo "exit_code=$EDITOR_EXIT" >> "$GITHUB_OUTPUT"
          exit "$EDITOR_EXIT"

      - name: Run automation tests (PubnubChat.Integration — 1Validation tier)
        id: tests_pubnubchat_integration_1validation
        if: always() && steps.build.outcome == 'success'
        continue-on-error: true
        env:
          HOME: ${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}/Saved/UEHome
        run: |
          mkdir -p "$HOME/Documents/Library/Application Support/Epic/UnrealEngine"
          UE_PATH="${{ env.UE_PATH }}"
          PROJ_DIR="${{ github.workspace }}/${{ env.TEST_PROJECT_DIR }}"
          UPROJECT="${{ steps.project.outputs.uproject }}"
          REPORT_DIR="$PROJ_DIR/Saved/TestReport_pubnubchat_1validation"
          RUN_SCRIPT="$PROJ_DIR/Plugins/PubnubChat/Scripts/run_mac_automation_tests.sh"
          FILTER_SCRIPT="$PROJ_DIR/Plugins/PubnubChat/Scripts/pubnubchat_integration_1validation_filter.py"
          chmod +x "$RUN_SCRIPT"
          AUTOMATION_FILTER="$(python3 "$FILTER_SCRIPT")" || exit 1
          set +e
          UE_PATH="$UE_PATH" PROJ_DIR="$PROJ_DIR" UPROJECT="$UPROJECT" \
            AUTOMATION_FILTER="$AUTOMATION_FILTER" \
            REPORT_DIR="$REPORT_DIR" \
            LOG_FILE="${{ github.workspace }}/test_run_pubnubchat_integration_1validation.log" \
            bash "$RUN_SCRIPT"
          EDITOR_EXIT=$?
          echo "exit_code=$EDITOR_EXIT" >> "$GITHUB_OUTPUT"
          exit "$EDITOR_EXIT"

      # --- Parse test output and report (merge four waves)
      - name: Parse and report test results
        if: always() && steps.build.outcome == 'success'
        env:
          TESTS_AUNIT_EXIT: ${{ steps.tests_aunit.outputs.exit_code }}
          TESTS_PUBNUB_INT_EXIT: ${{ steps.tests_pubnub_integration.outputs.exit_code }}
          TESTS_CHAT_UNIT_EXIT: ${{ steps.tests_pubnubchat_unit.outputs.exit_code }}
          TESTS_CHAT_1VAL_EXIT: ${{ steps.tests_pubnubchat_integration_1validation.outputs.exit_code }}
          TESTS_AUNIT_OUTCOME: ${{ steps.tests_aunit.outcome }}
          TESTS_PUBNUB_INT_OUTCOME: ${{ steps.tests_pubnub_integration.outcome }}
          TESTS_CHAT_UNIT_OUTCOME: ${{ steps.tests_pubnubchat_unit.outcome }}
          TESTS_CHAT_1VAL_OUTCOME: ${{ steps.tests_pubnubchat_integration_1validation.outcome }}
        run: |
          set -e
          WS="${{ github.workspace }}"
          TP="$WS/${{ env.TEST_PROJECT_DIR }}"
          LOG="$WS/test_run_merged.log"
          MERGED_JSON="$WS/merged_index.json"
          SPLIT_SCRIPT="$WS/Plugins/PubnubChat/Scripts/automation_log_split_report.py"
          MERGE_JSON_SCRIPT="$WS/Plugins/PubnubChat/Scripts/merge_automation_index_json.py"
          if [ ! -f "$SPLIT_SCRIPT" ]; then
            SPLIT_SCRIPT="$TP/Plugins/PubnubChat/Scripts/automation_log_split_report.py"
          fi
          if [ ! -f "$MERGE_JSON_SCRIPT" ]; then
            MERGE_JSON_SCRIPT="$TP/Plugins/PubnubChat/Scripts/merge_automation_index_json.py"
          fi

          # Merge editor logs (wave order) for one split-report pass.
          {
            echo ""
            echo "## CI automation wave: Pubnub.aUnit"
            echo ""
            cat "$WS/test_run_pubnub_aunit.log" 2>/dev/null || echo "(missing log)"
            echo ""
            echo "## CI automation wave: Pubnub.Integration"
            echo ""
            cat "$WS/test_run_pubnub_integration.log" 2>/dev/null || echo "(missing log)"
            echo ""
            echo "## CI automation wave: PubnubChat.Unit"
            echo ""
            cat "$WS/test_run_pubnubchat_unit.log" 2>/dev/null || echo "(missing log)"
            echo ""
            echo "## CI automation wave: PubnubChat.Integration (1Validation)"
            echo ""
            cat "$WS/test_run_pubnubchat_integration_1validation.log" 2>/dev/null || echo "(missing log)"
          } > "$LOG"

          # Sum index.json from each wave (authoritative counts).
          python3 "$MERGE_JSON_SCRIPT" -o "$MERGED_JSON" \
            "$TP/Saved/TestReport_aunit/index.json" \
            "$TP/Saved/TestReport_pubnub_integration/index.json" \
            "$TP/Saved/TestReport_pubnubchat_unit/index.json" \
            "$TP/Saved/TestReport_pubnubchat_1validation/index.json"

          PASSED=$(python3 -c 'import json,sys;print(json.load(open(sys.argv[1], encoding="utf-8-sig")).get("succeeded",0))' "$MERGED_JSON")
          FAILED=$(python3 -c 'import json,sys;print(json.load(open(sys.argv[1], encoding="utf-8-sig")).get("failed",0))' "$MERGED_JSON")
          WARNINGS=$(python3 -c 'import json,sys;print(json.load(open(sys.argv[1], encoding="utf-8-sig")).get("succeededWithWarnings",0))' "$MERGED_JSON")

          echo "### Combined automation (4 waves)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Wave | Step outcome | Editor exit |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pubnub.aUnit | $TESTS_AUNIT_OUTCOME | ${TESTS_AUNIT_EXIT:-} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pubnub.Integration | $TESTS_PUBNUB_INT_OUTCOME | ${TESTS_PUBNUB_INT_EXIT:-} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PubnubChat.Unit | $TESTS_CHAT_UNIT_OUTCOME | ${TESTS_CHAT_UNIT_EXIT:-} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PubnubChat.Integration 1Validation | $TESTS_CHAT_1VAL_OUTCOME | ${TESTS_CHAT_1VAL_EXIT:-} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          FULL_MD="$WS/automation_report_full.md"
          if [ -f "$SPLIT_SCRIPT" ] && [ -f "$LOG" ]; then
            echo "Automation: merged log lines=$(wc -l < "$LOG" 2>/dev/null || echo 0) → Summary + $FULL_MD"
            python3 "$SPLIT_SCRIPT" --log "$LOG" --json "$MERGED_JSON" --redact --full-output "$FULL_MD" >> "$GITHUB_STEP_SUMMARY"
            echo "Download **automation-reports** for merged log, per-wave logs, full markdown, merged_index.json." >> "$GITHUB_STEP_SUMMARY"
          elif [ -f "$LOG" ]; then
            echo "::warning::automation_log_split_report.py missing"
            echo "### Test run summary (merged JSON only)" >> "$GITHUB_STEP_SUMMARY"
            echo "| Passed | $PASSED |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Failed | $FAILED |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No merged log."
            exit 1
          fi

          if grep -q "Failed to find game directory" "$LOG" 2>/dev/null; then
            echo "Editor did not load the .uproject (Failed to find game directory)."
            exit 1
          fi

          for name in "tests_aunit" "tests_pubnub_integration" "tests_pubnubchat_unit" "tests_pubnubchat_integration_1validation"; do
            case "$name" in
              tests_aunit) O="$TESTS_AUNIT_OUTCOME" ;;
              tests_pubnub_integration) O="$TESTS_PUBNUB_INT_OUTCOME" ;;
              tests_pubnubchat_unit) O="$TESTS_CHAT_UNIT_OUTCOME" ;;
              *) O="$TESTS_CHAT_1VAL_OUTCOME" ;;
            esac
            if [ "$O" = "skipped" ] || [ "$O" = "cancelled" ]; then
              echo "A test wave was $O; expected all four waves after successful build."
              exit 1
            fi
          done

          ANY_FAIL=0
          for code in "$TESTS_AUNIT_EXIT" "$TESTS_PUBNUB_INT_EXIT" "$TESTS_CHAT_UNIT_EXIT" "$TESTS_CHAT_1VAL_EXIT"; do
            if [ -n "$code" ] && [ "$code" != "0" ]; then
              ANY_FAIL=1
              break
            fi
          done
          if [ "$ANY_FAIL" -ne 0 ]; then
            echo "One or more automation waves exited non-zero."
            exit 1
          fi

          if [ "$FAILED" -gt 0 ]; then
            echo "Merged index.json reports failed=$FAILED."
            exit 1
          fi

      - name: Upload automation reports (full markdown + editor log)
        if: always() && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: automation-reports
          path: |
            automation_report_full.md
            merged_index.json
            test_run_merged.log
            test_run_pubnub_aunit.log
            test_run_pubnub_integration.log
            test_run_pubnubchat_unit.log
            test_run_pubnubchat_integration_1validation.log
          if-no-files-found: warn
